<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이헌타 정밀 계산기 v5.5</title>
    <style>
        :root { --bg: #1a1a1a; --card: #262626; --accent: #00e676; --text: #eee; --log-bg: #111; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { position: sticky; top: 0; background: #333; padding: 15px; border-bottom: 2px solid var(--accent); z-index: 100; text-align: center; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .section-title { font-weight: bold; color: var(--accent); margin: 15px 0 5px; font-size: 0.9rem; }
        .card { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        label { font-size: 0.7rem; color: #aaa; display: block; margin-bottom: 2px; }
        input, select { width: 100%; background: #333; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; box-sizing: border-box; font-size: 0.85rem; }
        input[type="checkbox"] { width: auto; transform: scale(1.2); margin-right: 8px; }
        .eff { font-size: 1.4rem; color: var(--accent); font-weight: bold; margin-top: 5px; }
        .log-container { display: none; background: var(--log-bg); padding: 15px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 0.8rem; border: 1px solid #444; color: #00ff41; overflow-x: auto; line-height: 1.6; }
        .btn { background: #444; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .help-box { background: #333; border: 1px dashed var(--accent); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; color: #ccc; display: none; }
        .footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #666; }
        hr { border: 0; border-top: 1px solid #444; margin: 10px 0; }
    </style>
</head>
<body>

<div class="header">
    <div style="margin-bottom:10px;">
        <select id="calc_mode" onchange="calc()" style="width: auto;">
            <option value="village">마을/보스 모드</option>
            <option value="colo">콜로세움 모드</option>
        </select>
    </div>
    <div style="display:flex; justify-content: space-around;">
        <div>현재 데미지<br><span id="cur_d">0</span></div>
        <div>비교 데미지<br><span id="next_d">0</span></div>
    </div>
    <div class="eff" id="eff_out">효율: +0.00%</div>
</div>

<div class="container">
    <button class="btn" onclick="toggleElement('help-box')" style="background: #222; border: 1px solid #444; margin-bottom: 5px;">📖 사용 설명서 (클릭하여 열기/닫기)</button>
    <div id="help-box" class="help-box">
        <div id="help-content">
            1. <b>종족</b>: 목표 종족에 대한 수치를 직접 입력하세요.<br>
            2. <b>공격력/치피</b>: 각 항목에 맞는 수치를 입력하면 배율로 환산됩니다.<br>
            3. <b>로직</b>: 종족 피해량은 (기본 100) × (장비룬 배율) × (탈것도감 배율)로 계산됩니다.
        </div>
    </div>

    <div class="section-title">공격력 기초 (A)</div>
    <div class="card">
        <div style="margin-bottom:10px;">
            <label><input type="checkbox" id="a_carve" onchange="calc()"> 무기 각인 활성화 (기본공 100→107)</label>
        </div>
        <div class="row">
            <div><label>승전 버프(%)</label><input type="number" id="a_win" placeholder="0" oninput="calc()"></div>
            <div><label>지던 버프(%)</label><input type="number" id="a_dungeon" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">공격력 증가 항목</div>
    <div class="card">
        <div class="row">
            <div><label>성격</label><select id="b_per" onchange="calc()"><option value="0">없음</option><option value="7">영웅심리(+7%)</option><option value="10">힘쌘(+10%)</option></select></div>
            <div><label>연합 버프</label><input type="number" id="b_uni" placeholder="15" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>공격력 스텟 등급</label>
                <select id="b_stat_grade" onchange="calc()">
                    <option value="0">회색 (+0%)</option>
                    <option value="10">파랑 (+10%)</option>
                    <option value="20">주황 (+20%)</option>
                    <option value="30" selected>보라 (+30%)</option>
                </select>
            </div>
            <div><label>헌터 등급</label>
                <select id="b_grade_val" onchange="calc()">
                    <option value="4">H+ (+4%)</option>
                    <option value="5">L (+5%)</option>
                    <option value="6">L+ (+6%)</option>
                    <option value="7">U (+7%)</option>
                    <option value="8" selected>U+ (+8%)</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div><label>비법+이외</label><input type="number" id="b_etc" placeholder="15" oninput="calc()"></div>
            <div><label>C: 건물+펫</label><input type="number" id="c_val" placeholder="85" oninput="calc()"></div>
        </div>
        <hr><label style="text-align:center; margin-bottom:5px;">[전공 세부 능력치]</label>
        <div class="row-3">
            <div><label>무기 코스튬(%)</label><input type="number" id="d_mu" placeholder="0" oninput="calc()"></div>
            <div><label>도감(%)</label><input type="number" id="d_dogam" placeholder="0" oninput="calc()"></div>
            <div><label>인장(%)</label><input type="number" id="d_in" placeholder="0" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>D: 탈것+탈것장비(공 %)</label><input type="number" id="d_ride" placeholder="0" oninput="calc()"></div>
            <div><label>E: 요정(공 %)</label><input type="number" id="e_fairy" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">치명타 피해량 (기본 175)</div>
    <div class="card">
        <div class="row">
            <div><label>C: 건물+펫(기본81)</label><input type="number" id="cp_base" placeholder="81" oninput="calc()"></div>
            <div><label>이외(합연산)</label><input type="number" id="cp_etc" placeholder="0" oninput="calc()"></div>
        </div>
        <hr><label style="text-align:center; margin-bottom:5px;">[치피 탈것 및 도감]</label>
        <div class="row">
            <div><label>도감(곱 %)</label><input type="number" id="cp_mult_dogam" placeholder="0" oninput="calc()"></div>
            <div><label>탈것+탈것장비(곱 %)</label><input type="number" id="cp_mult_ride" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">종족 피해량 (기본 100)</div>
    <div class="card">
        <div class="row">
            <div><label>A: 승전 버프(%)</label><input type="number" id="sp_win" placeholder="0" oninput="calc()"></div>
            <div><label>D: 이외(곱연산 %)</label><input type="number" id="sp_d" placeholder="0" oninput="calc()"></div>
        </div>
        <hr><label style="text-align:center; margin-bottom:5px;">[종족 탈것 및 도감 - 곱연산 계열]</label>
        <div class="row">
            <div><label>탈것+탈것장비(%)</label><input type="number" id="sp_ride" placeholder="0" oninput="calc()"></div>
            <div><label>도감(%)</label><input type="number" id="sp_dogam" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">📦 현재 장비 + 룬 상세</div>
    <div class="card" style="border: 1px solid #555;">
        <div class="row">
            <div><label>전공 장비(%)</label><input type="number" id="cur_atk_eq" placeholder="0" oninput="calc()"></div>
            <div><label>전공 룬(%)</label><input type="number" id="cur_atk_rune" placeholder="24" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>치피 장비(%)</label><input type="number" id="cur_cp_eq" placeholder="0" oninput="calc()"></div>
            <div><label>치피 룬(%)</label><input type="number" id="cur_cp_rune" placeholder="28" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>종족 장비(%)</label><input type="number" id="cur_sp_eq" placeholder="0" oninput="calc()"></div>
            <div><label>종족 룬(%)</label><input type="number" id="cur_sp_rune" placeholder="28" oninput="calc()"></div>
        </div>
        <div class="row">
            <div style="grid-column: span 2;"><label>증폭(%)</label><input type="number" id="cur_amp" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">✨ 시뮬레이션</div>
    <div class="card" style="border: 1px solid var(--accent);">
        <div class="row">
            <div><label>추가 전공</label><input type="number" id="n_atk" placeholder="0" oninput="calc()"></div>
            <div><label>추가 치피</label><input type="number" id="n_cp" placeholder="0" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>추가 증폭</label><input type="number" id="n_amp" placeholder="0" oninput="calc()"></div>
            <div><label>추가 종족</label><input type="number" id="n_sp" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <button class="btn" onclick="toggleElement('log-box')">📊 상세 계산 로그 비교 보기</button>
    <div id="log-box" class="log-container"></div>

    <div class="footer">Made by 과자꽃 to Flower연합</div>
</div>

<script>
    function toggleElement(id) {
        const box = document.getElementById(id);
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    function calc() {
        const g = (id) => {
            const val = document.getElementById(id).value;
            const placeholder = document.getElementById(id).placeholder;
            return val === "" ? (placeholder === "" ? 0 : parseFloat(placeholder)) : parseFloat(val);
        };
        const mode = document.getElementById('calc_mode').value;
        const carve = document.getElementById('a_carve').checked ? 107 : 100;

        const getStats = (addAtk=0, addCp=0, addAmp=0, addSp=0) => {
            // 1. 공격력 배율
            const multA = (100 + g('a_win') + g('a_dungeon')) / 100;
            const b_sum = g('b_per') + g('b_uni') + g('b_stat_grade') + g('b_grade_val') + g('b_etc');
            const cur_atk_sum = g('cur_atk_eq') + g('cur_atk_rune');
            const multBC = (100 + b_sum + g('c_val') + cur_atk_sum + addAtk) / 100;
            const d_total = g('d_mu') + g('d_dogam') + g('d_in') + g('d_ride');
            const multD = (100 + d_total) / 100;
            const multE = (100 + g('e_fairy')) / 100;
            const totalAtk = (mode === 'village') ? carve * multA * multBC * multD * multE : carve * multBC * multD * multE;

            // 2. 치피 배율 (기본 + 합연산 항목들) * (곱연산 배율)
            const cpCurSum = g('cur_cp_eq') + g('cur_cp_rune');
            const cpBaseSum = 175 + g('cp_base') + g('cp_etc') + cpCurSum + addCp;
            const cpMult = (100 + g('cp_mult_dogam') + g('cp_mult_ride')) / 100;
            const totalCp = (cpBaseSum * cpMult) / 100;

            // 3. 종족 피해량 (요청하신 로직: 100 * 1.n * 1.n 구조)
            const spMultWin = (100 + g('sp_win')) / 100; // 승전
            const spEqRuneMult = (100 + g('cur_sp_eq') + g('cur_sp_rune') + addSp) / 100; // 장비+룬 배율 (1.n)
            const spRideDogamMult = (100 + g('sp_ride') + g('sp_dogam')) / 100; // 탈것+도감 배율 (1.n)
            const spEtcMult = (100 + g('sp_d')) / 100; // 기타 곱연산
            const totalSp = (100 * spEqRuneMult * spRideDogamMult * spMultWin * spEtcMult) / 100;

            // 4. 증폭
            const totalAmp = (100 + g('cur_amp') + addAmp) / 100;

            const final = totalAtk * totalCp * totalSp * totalAmp;
            return { multA, multBC, multD, multE, totalAtk, cpBaseSum, cpMult, totalCp, spEqRuneMult, spRideDogamMult, spMultWin, spEtcMult, totalSp, totalAmp, final };
        };

        const cur = getStats();
        const next = getStats(g('n_atk'), g('n_cp'), g('n_amp'), g('n_sp'));

        document.getElementById('cur_d').innerText = Math.floor(cur.final).toLocaleString();
        document.getElementById('next_d').innerText = Math.floor(next.final).toLocaleString();
        
        const diff = ((next.final / cur.final) - 1) * 100;
        const out = document.getElementById('eff_out');
        out.innerText = `효율: ${diff >= 0 ? '+' : ''}${diff.toFixed(2)}%`;
        out.style.color = diff >= 0 ? '#00e676' : '#ff5252';

        const generateLog = (title, data, color) => {
            let log = `<div style='color:${color}; font-weight:bold; border-bottom:1px solid #444;'>[${title}]</div>`;
            log += `공격력: ${carve}${mode==='village'?' × '+data.multA.toFixed(3):''} × ${data.multBC.toFixed(3)} × ${data.multD.toFixed(3)} × ${data.multE.toFixed(3)} = ${data.totalAtk.toFixed(1)}<br>`;
            log += `치피배율: (${data.cpBaseSum} × ${data.cpMult.toFixed(3)}) / 100 = ${data.totalCp.toFixed(2)}배<br>`;
            log += `종족배율: (100 × ${data.spEqRuneMult.toFixed(3)} × ${data.spRideDogamMult.toFixed(3)} × ${data.spMultWin.toFixed(2)} × ${data.spEtcMult.toFixed(2)}) / 100 = ${data.totalSp.toFixed(2)}배<br>`;
            log += `최종수식: ${data.totalAtk.toFixed(1)} (공) × ${data.totalCp.toFixed(2)} (치) × ${data.totalSp.toFixed(2)} (종) × ${data.totalAmp.toFixed(2)} (증)<br>`;
            log += `최종결과: <b>${Math.floor(data.final).toLocaleString()}</b><br><br>`;
            return log;
        };

        document.getElementById('log-box').innerHTML = generateLog("현재 세팅", cur, "#f39c12") + generateLog("비교 세팅", next, "#00e676");
    }
    window.onload = calc;
</script>
</body>
</html>
