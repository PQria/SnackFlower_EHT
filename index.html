<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이헌타 정밀 계산기 v7.1</title>
    <style>
        :root { --bg: #1a1a1a; --card: #262626; --accent: #00e676; --text: #eee; --log-bg: #111; --unique: #ff9800; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { position: sticky; top: 0; background: #333; padding: 10px; border-bottom: 2px solid var(--accent); z-index: 100; text-align: center; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .section-title { font-weight: bold; color: var(--accent); margin: 15px 0 5px; font-size: 0.9rem; }
        .card { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        label { font-size: 0.7rem; color: #aaa; display: block; margin-bottom: 2px; }
        input, select { width: 100%; background: #333; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; box-sizing: border-box; font-size: 0.85rem; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .u-btn, .s-btn { flex: 1; min-width: 60px; padding: 8px 4px; font-size: 0.7rem; background: #444; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; }
        .u-btn.active, .s-btn.active { background: var(--unique); border-color: #fff; font-weight: bold; }
        .eff { font-size: 1.4rem; color: var(--accent); font-weight: bold; margin-top: 5px; }
        .log-container { display: none; background: var(--log-bg); padding: 15px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 0.75rem; border: 1px solid #444; color: #00ff41; line-height: 1.6; white-space: pre-wrap; }
        .btn { background: #444; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .notice { background: #3e2723; color: #ffab91; padding: 10px; border-radius: 5px; font-size: 0.8rem; border: 1px solid #d84315; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="header">
    <div style="margin-bottom: 5px;">
        <select id="calc_mode" onchange="changeMode()" style="width: auto;">
            <option value="village">마을/보스 모드</option>
            <option value="colo">콜로세움 모드</option>
        </select>
    </div>
    <div style="display:flex; justify-content: space-around; font-size: 0.8rem;">
        <div>현재<br><span id="cur_d" style="font-weight:bold; color:var(--accent);">0</span></div>
        <div>비교<br><span id="next_d" style="font-weight:bold; color:#fff;">0</span></div>
    </div>
    <div class="eff" id="eff_out">효율: +0.00%</div>
</div>

<div class="container">
    <div class="section-title">📢 유의사항 및 공지</div>
    <div class="notice">
        유니크 선택 시 효율이 변하지 않도록 격리되었습니다. <br>
        스왑 도구는 현재 착용 장비에 따라 실시간으로 인터페이스가 변경됩니다.
    </div>

    <button class="btn" style="border: 1px solid var(--unique); color: var(--unique); background:#222;" onclick="toggleElement('unique-section')">💎 현재 착용 유니크 설정</button>
    <div id="unique-section" style="display:none; margin-bottom: 20px;">
        <div class="card" style="border: 1px solid var(--unique); margin-top:10px;">
            <div class="btn-group">
                <button class="u-btn" data-type="blood" data-val="250" onclick="toggleUnique(this)">블러드피스트</button>
                <button class="u-btn" data-type="blood" data-val="300" onclick="toggleUnique(this)">진 블피</button>
                <button class="u-btn" data-type="wind" data-val="30" onclick="toggleUnique(this)">질풍신</button>
                <button class="u-btn" data-type="wind" data-val="40" onclick="toggleUnique(this)">진 질풍신</button>
                <button class="u-btn" data-type="neck" data-val="20" onclick="toggleUnique(this)">용의 목걸이</button>
            </div>
            <div id="wind-input-area" style="display:none; background: #111; padding: 10px; border-radius: 5px; margin-top:10px;">
                <label style="color:var(--unique);">🍃 현재 질풍신 이속 상세</label>
                <div class="row">
                    <div><label>헌터등급</label><select id="ms_hunter" onchange="calc()"><option value="30">울티</option><option value="20">레전</option></select></div>
                    <div><label>건물이속</label><input type="number" id="ms_build" placeholder="50" oninput="calc()"></div>
                </div>
                <div class="row">
                    <div><label>코스튬(40)</label><select id="ms_cos" onchange="calc()"><option value="40">ON</option><option value="0">OFF</option></select></div>
                    <div><label>날개(20)</label><select id="ms_wing" onchange="calc()"><option value="20">ON</option><option value="0">OFF</option></select></div>
                </div>
                <div class="row">
                    <div><label>질풍신 옵%</label><input type="number" id="ms_wind_rate" placeholder="10" oninput="calc()"></div>
                    <div><label>장비이속합</label><input type="number" id="ms_eq_sum" placeholder="0" oninput="calc()"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="section-title">공격력 항목 (A~E)</div>
    <div class="card">
        <label style="color:white; display:flex; align-items:center; cursor:pointer; margin-bottom:10px; background:#444; padding:5px; border-radius:4px;">
            <input type="checkbox" id="a_carve" onchange="calc()" style="width:auto; margin-right:8px;"> 무기 각인 활성화 (데미지 107%)
        </label>
        <div class="row">
            <div><label>승전(%)</label><input type="number" id="a_win" placeholder="0" oninput="calc()"></div>
            <div><label>지던(%)</label><input type="number" id="a_dungeon" placeholder="0" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>연합(%)</label><input type="number" id="b_uni" placeholder="15" oninput="calc()"></div>
            <div><label>비법(%)</label><input type="number" id="b_etc" placeholder="15" oninput="calc()"></div>
        </div>
        <div class="row-3">
            <div><label>C:건물/펫</label><input type="number" id="c_val" placeholder="85" oninput="calc()"></div>
            <div><label>D:기타합</label><input type="number" id="d_sum" placeholder="0" oninput="calc()"></div>
            <div><label>E:요정</label><input type="number" id="e_fairy" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="row"><div class="section-title">치명타 피해량</div><div class="section-title">종족 피해량</div></div>
    <div class="card row">
        <div style="border-right:1px solid #444; padding-right:8px;">
            <label>건물+펫(81)</label><input type="number" id="cp_base" placeholder="81" oninput="calc()">
            <label>도감(곱%)</label><input type="number" id="cp_dogam" placeholder="0" oninput="calc()">
            <label>탈것(곱%)</label><input type="number" id="cp_ride" placeholder="0" oninput="calc()">
        </div>
        <div>
            <label>승전(%)</label><input type="number" id="sp_win" placeholder="0" oninput="calc()">
            <label>도감(곱%)</label><input type="number" id="sp_dogam" placeholder="0" oninput="calc()">
            <label>탈것(곱%)</label><input type="number" id="sp_ride" placeholder="0" oninput="calc()">
        </div>
    </div>

    <div class="section-title">📦 현재 장비 + 룬 상세</div>
    <div class="card">
        <div class="row">
            <div><label>전공 장비</label><input type="number" id="cur_atk_eq" placeholder="0" oninput="calc()"></div>
            <div><label>전공 룬</label><input type="number" id="cur_atk_rune" placeholder="24" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>치피 장비</label><input type="number" id="cur_cp_eq" placeholder="0" oninput="calc()"></div>
            <div><label>치피 룬</label><input type="number" id="cur_cp_rune" placeholder="28" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>종족 장비</label><input type="number" id="cur_sp_eq" placeholder="0" oninput="calc()"></div>
            <div><label>종족 룬</label><input type="number" id="cur_sp_rune" placeholder="28" oninput="calc()"></div>
        </div>
        <div class="row">
            <div style="grid-column: span 2;"><label>현재 증폭%</label><input type="number" id="cur_amp" value="0" readonly style="border:1px solid var(--unique); color:var(--unique);"></div>
        </div>
    </div>

    <div class="section-title">✨ 시뮬레이션 (비교군)</div>
    <div class="card" style="border: 2px solid var(--accent);">
        <div class="row">
            <div><label>추가 공%</label><input type="number" id="n_atk" value="0" oninput="calc()"></div>
            <div><label>추가 치피%</label><input type="number" id="n_cp" value="0" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>추가 증폭%</label><input type="number" id="n_amp" value="0" oninput="calc()"></div>
            <div><label>추가 종족%</label><input type="number" id="n_sp" value="0" oninput="calc()"></div>
        </div>
        
        <button class="btn" style="background:#2c3e50; border:1px solid var(--unique); color:var(--unique);" onclick="openSwapTool()">🔄 유니크 스왑 시뮬레이션 도구</button>
        <div id="dynamic-swap-box" style="display:none; margin-top:10px; background:#111; padding:12px; border-radius:8px; border:1px dashed var(--unique);">
            <div id="swap-tool-content"></div>
        </div>
        <button class="btn" style="background:#c0392b; margin-top:10px;" onclick="resetSim()">🧹 시뮬레이션 초기화</button>
    </div>

    <button class="btn" onclick="toggleElement('log-box')">📊 상세 계산 로직 확인</button>
    <div id="log-box" class="log-container" style="display:block;"></div>
</div>

<script>
    let simWindLimit = 40;
    let simBloodVal = 300;

    function v(id) {
        const el = document.getElementById(id);
        return parseFloat(el.value) || parseFloat(el.placeholder) || 0;
    }

    function toggleElement(id) {
        const box = document.getElementById(id);
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    function toggleUnique(btn) {
        const type = btn.getAttribute('data-type');
        if(btn.classList.contains('active')) {
            btn.classList.remove('active');
        } else {
            document.querySelectorAll(`.u-btn[data-type="${type}"]`).forEach(b => b.classList.remove('active'));
            if(document.querySelectorAll('.u-btn.active').length >= 2) return alert("유니크는 최대 2개입니다.");
            btn.classList.add('active');
        }
        document.getElementById('wind-input-area').style.display = Array.from(document.querySelectorAll('.u-btn.active')).some(b => b.innerText.includes("질풍신")) ? 'block' : 'none';
        
        if(document.getElementById('dynamic-swap-box').style.display === 'block') openSwapTool();
        calc();
    }

    function openSwapTool() {
        const box = document.getElementById('dynamic-swap-box');
        const content = document.getElementById('swap-tool-content');
        const activeNames = Array.from(document.querySelectorAll('.u-btn.active')).map(b => b.innerText);
        
        const hasBlood = activeNames.some(t => t.includes("블피") || t.includes("블러드"));
        const hasWind = activeNames.some(t => t.includes("질풍신"));

        if(hasBlood && hasWind) {
            content.innerHTML = `<div style="color:#ff5252; text-align:center;">블피와 질풍신을 모두 착용 중입니다.</div>`;
        } else if(hasBlood) {
            content.innerHTML = `
                <div style="font-size:0.8rem; color:var(--unique); text-align:center; margin-bottom:10px;">[블피 → 질풍신 스왑 시뮬]</div>
                <div class="btn-group">
                    <button class="s-btn ${simWindLimit===30?'active':''}" onclick="simWindLimit=30; openSwapTool()">질풍신(30)</button>
                    <button class="s-btn ${simWindLimit===40?'active':''}" onclick="simWindLimit=40; openSwapTool()">진 질풍신(40)</button>
                </div>
                <div class="row">
                    <div><label>헌터이속</label><select id="s_h"><option value="30">울티</option><option value="20">레전</option></select></div>
                    <div><label>건물이속</label><input type="number" id="s_b" value="50"></div>
                </div>
                <div class="row">
                    <div><label>코스튬</label><select id="s_cos"><option value="40">ON</option><option value="0">OFF</option></select></div>
                    <div><label>날개</label><select id="s_wing"><option value="20">ON</option><option value="0">OFF</option></select></div>
                </div>
                <button class="btn" style="background:var(--unique);" onclick="applySwap('toWind')">시뮬레이션 적용</button>`;
        } else if(hasWind) {
            content.innerHTML = `
                <div style="font-size:0.8rem; color:var(--unique); text-align:center; margin-bottom:10px;">[질풍신 → 블피 스왑 시뮬]</div>
                <div class="btn-group">
                    <button class="s-btn ${simBloodVal===250?'active':''}" onclick="simBloodVal=250; openSwapTool()">블피(+250)</button>
                    <button class="s-btn ${simBloodVal===300?'active':''}" onclick="simBloodVal=300; openSwapTool()">진 블피(+300)</button>
                </div>
                <button class="btn" style="background:var(--unique);" onclick="applySwap('toBlood')">시뮬레이션 적용</button>`;
        } else {
            content.innerHTML = `<div style="text-align:center;">착용 중인 블피/질풍신이 없습니다.</div>`;
        }
        box.style.display = 'block';
    }

    function applySwap(mode) {
        const activeNames = Array.from(document.querySelectorAll('.u-btn.active')).map(b => b.innerText);
        if(mode === 'toWind') {
            const ms = parseFloat(document.getElementById('s_h').value) + parseFloat(document.getElementById('s_b').value) + parseFloat(document.getElementById('s_cos').value) + parseFloat(document.getElementById('s_wing').value) + 150; 
            const amp = Math.min(ms * 0.1, simWindLimit);
            document.getElementById('n_cp').value = activeNames.some(t => t.includes("진 블피")) ? -300 : -250;
            document.getElementById('n_amp').value = amp.toFixed(1);
        } else {
            const curAmp = parseFloat(document.getElementById('cur_amp').value);
            const neckVal = activeNames.some(t => t.includes("목걸이")) ? 20 : 0;
            document.getElementById('n_amp').value = -(curAmp - neckVal);
            document.getElementById('n_cp').value = simBloodVal;
        }
        calc();
    }

    function resetSim() {
        ['n_atk', 'n_cp', 'n_amp', 'n_sp'].forEach(id => document.getElementById(id).value = 0);
        calc();
    }

    function changeMode() {
        document.getElementById('b_uni').value = (document.getElementById('calc_mode').value === 'colo' ? 5 : 15);
        calc();
    }

    function calc() {
        const mode = document.getElementById('calc_mode').value;
        const carve = document.getElementById('a_carve').checked ? 107 : 100;

        let cur_u_cp = 0, cur_u_amp = 0;
        document.querySelectorAll('.u-btn.active').forEach(btn => {
            const type = btn.getAttribute('data-type');
            if(type === 'blood') cur_u_cp = parseFloat(btn.getAttribute('data-val'));
            if(type === 'neck') cur_u_amp += 20;
            if(type === 'wind') {
                const ms = v('ms_hunter') + v('ms_build') + v('ms_cos') + v('ms_wing') + v('ms_eq_sum') + 115;
                cur_u_amp += Math.min(ms * (v('ms_wind_rate') || 10) / 100, parseFloat(btn.getAttribute('data-val')));
            }
        });
        document.getElementById('cur_amp').value = cur_u_amp.toFixed(1);

        const run = (isNext) => {
            const A = (100 + v('a_win') + v('a_dungeon')) / 100;
            const BCD = (100 + v('b_uni') + v('b_etc') + v('c_val') + v('d_sum') + v('cur_atk_eq') + v('cur_atk_rune') + (isNext ? v('n_atk') : 0)) / 100;
            const E = (100 + v('e_fairy')) / 100;
            const atk = (mode === 'village' ? carve * A : carve) * BCD * E;

            const cpTotal = (175 + v('cp_base') + v('cur_cp_eq') + v('cur_cp_rune') + (isNext ? v('n_cp') : cur_u_cp));
            const cpRate = (100 + v('cp_dogam') + v('cp_ride')) / 100;
            const finalCp = (cpTotal * cpRate) / 100;

            const spBase = (100 + v('cur_sp_eq') + v('cur_sp_rune') + (isNext ? v('n_sp') : 0));
            const spRate = (100 + v('sp_dogam') + v('sp_ride')) / 100 * (100 + v('sp_win')) / 100;
            const finalSp = (spBase * spRate) / 100;

            const finalAmp = (100 + v('cur_amp') + (isNext ? v('n_amp') : 0)) / 100;

            return { final: atk * finalCp * finalSp * finalAmp, atk, cp: finalCp, sp: finalSp, amp: finalAmp, rawCp: cpTotal, rawSp: spBase };
        };

        const cur = run(false);
        const next = run(true);

        document.getElementById('cur_d').innerText = Math.floor(cur.final).toLocaleString();
        document.getElementById('next_d').innerText = Math.floor(next.final).toLocaleString();
        const diff = ((next.final / cur.final) - 1) * 100;
        document.getElementById('eff_out').innerText = `효율: ${diff >= 0 ? '+' : ''}${diff.toFixed(2)}%`;
        document.getElementById('eff_out').style.color = diff >= 0 ? '#00e676' : '#ff5252';

        document.getElementById('log-box').innerHTML = `
<b>[공격력(Atk)]</b>
현재: ${atkLog(cur)} = ${cur.atk.toFixed(1)}
비교: ${atkLog(next)} = ${next.atk.toFixed(1)}

<b>[치명타 피해(Crit)]</b>
현재: (${cur.rawCp}% * ${v('cp_dogam')+v('cp_ride')}%증가) = ${cur.cp.toFixed(2)}배
비교: (${next.rawCp}% * ${v('cp_dogam')+v('cp_ride')}%증가) = ${next.cp.toFixed(2)}배

<b>[종족 피해(Species)]</b>
현재: (${cur.rawSp}% * 종족증가) = ${cur.sp.toFixed(2)}배
비교: (${next.rawSp}% * 종족증가) = ${next.sp.toFixed(2)}배

<b>[증폭(Amp)]</b>
현재: (100 + ${v('cur_amp')})% = ${cur.amp.toFixed(2)}배
비교: (100 + ${v('cur_amp')+v('n_amp')})% = ${next.amp.toFixed(2)}배

<b>[결과]</b>
최종 효율: ${diff.toFixed(4)}%`;
    }

    function atkLog(res) {
        return `A * BCD * E`;
    }

    window.onload = () => { changeMode(); calc(); };
</script>
</body>
</html>
