<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이헌타 정밀 계산기 v1.8</title>
    <style>
        :root { --bg: #1a1a1a; --card: #262626; --accent: #00e676; --text: #eee; --log-bg: #111; --unique: #ff9800; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { position: sticky; top: 0; background: #333; padding: 15px; border-bottom: 2px solid var(--accent); z-index: 100; text-align: center; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .section-title { font-weight: bold; color: var(--accent); margin: 15px 0 5px; font-size: 0.9rem; }
        .card { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        label { font-size: 0.7rem; color: #aaa; display: block; margin-bottom: 2px; }
        input, select { width: 100%; background: #333; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; box-sizing: border-box; font-size: 0.85rem; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .u-btn { flex: 1; min-width: 80px; padding: 10px 5px; font-size: 0.75rem; background: #444; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; }
        .u-btn.active { background: var(--unique); border-color: #fff; font-weight: bold; }
        .eff { font-size: 1.4rem; color: var(--accent); font-weight: bold; margin-top: 5px; }
        .log-container { display: none; background: var(--log-bg); padding: 15px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 0.8rem; border: 1px solid #444; color: #00ff41; overflow-x: auto; line-height: 1.6; }
        .btn { background: #444; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .u-toggle-btn { background: #222; border: 1px solid var(--unique); color: var(--unique); margin-bottom: 15px; }
        hr { border: 0; border-top: 1px solid #444; margin: 10px 0; }
    </style>
</head>
<body>

<div class="header">
    <div style="margin-bottom:10px;">
        <select id="calc_mode" onchange="calc()" style="width: auto;">
            <option value="village">마을/보스 모드</option>
            <option value="colo">콜로세움 모드</option>
        </select>
    </div>
    <div style="display:flex; justify-content: space-around;">
        <div>현재 데미지<br><span id="cur_d">0</span></div>
        <div>비교 데미지<br><span id="next_d">0</span></div>
    </div>
    <div class="eff" id="eff_out">효율: +0.00%</div>
</div>

<div class="container">
    <button class="btn u-toggle-btn" onclick="toggleElement('unique-section')">💎 유니크 비교 기능 사용 (열기/닫기)</button>
    
    <div id="unique-section" style="display:none; margin-bottom: 20px;">
        <div class="section-title" style="color:var(--unique);">유니크 장비 선택 (최대 2개)</div>
        <div class="card" style="border: 1px solid var(--unique);">
            <div class="btn-group">
                <button class="u-btn" data-type="blood" data-val="250" onclick="toggleUnique(this)">블러드피스트</button>
                <button class="u-btn" data-type="blood" data-val="300" onclick="toggleUnique(this)">진 블피</button>
                <button class="u-btn" data-type="wind" data-val="30" onclick="toggleUnique(this)">질풍신</button>
                <button class="u-btn" data-type="wind" data-val="40" onclick="toggleUnique(this)">진 질풍신</button>
                <button class="u-btn" data-type="neck" data-val="20" onclick="toggleUnique(this)">용의 목걸이</button>
            </div>

            <div id="wind-input-area" style="display:none; background: #111; padding: 10px; border-radius: 5px;">
                <label style="color:var(--unique);">🍃 질풍신 이속 상세 입력</label>
                <div class="row">
                    <div><label>헌터등급이속</label><select id="ms_hunter" onchange="calc()"><option value="0">일반(0%)</option><option value="10">히로익(10%)</option><option value="20">레전(20%)</option><option value="30">울티(30%)</option></select></div>
                    <div><label>건물이속(0~50)</label><input type="number" id="ms_build" placeholder="50" oninput="calc()"></div>
                </div>
                <div class="row">
                    <div><label>코스튬(40%)</label><select id="ms_cos" onchange="calc()"><option value="0">OFF</option><option value="40">ON</option></select></div>
                    <div><label>날개(20%)</label><select id="ms_wing" onchange="calc()"><option value="0">OFF</option><option value="20">ON</option></select></div>
                </div>
                <div class="row">
                    <div><label>인장(20%)</label><select id="ms_seal" onchange="calc()"><option value="0">OFF</option><option value="20">ON</option></select></div>
                    <div><label>라이딩(30%)</label><select id="ms_ride" onchange="calc()"><option value="0">OFF</option><option value="30">ON</option></select></div>
                </div>
                <div class="row">
                    <div><label>질풍신자체/장비합</label><input type="number" id="ms_etc_sum" placeholder="0" oninput="calc()"></div>
                    <div><label>편자(B15/A30/S45)</label><select id="ms_shoe" onchange="calc()"><option value="0">0%</option><option value="15">15%</option><option value="30">30%</option><option value="45">45%</option></select></div>
                </div>
                <div class="row">
                    <div><label>성격(영웅7/달리기10)</label><select id="ms_per" onchange="calc()"><option value="0">0%</option><option value="7">7%</option><option value="10">10%</option></select></div>
                    <div><label>비법(15%고정)</label><input type="text" value="15%" disabled style="text-align:center;"></div>
                </div>
                <div class="row">
                    <div><label>글레이셜(80%)</label><select id="ms_bow" onchange="calc()"><option value="0">OFF</option><option value="80">ON</option></select></div>
                    <div><label>대악마(200%)</label><select id="ms_devil" onchange="calc()"><option value="0">OFF</option><option value="200">ON</option></select></div>
                </div>
                <div class="row">
                    <div style="grid-column: span 2;"><label>착용 질풍신 옵션 %(3~10)</label><input type="number" id="ms_wind_rate" placeholder="10" oninput="calc()"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="section-title">공격력 기초 (A)</div>
    <div class="card">
        <label><input type="checkbox" id="a_carve" onchange="calc()"> 무기 각인 활성화 (100→107)</label>
        <div class="row">
            <div><label>승전 버프(%)</label><input type="number" id="a_win" placeholder="0" oninput="calc()"></div>
            <div><label>지던 버프(%)</label><input type="number" id="a_dungeon" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">공격력 증가 항목 (B, C, D, E)</div>
    <div class="card">
        <div class="row">
            <div><label>성격/연합/비법 등 합(%)</label><input type="number" id="b_etc" placeholder="60" oninput="calc()"></div>
            <div><label>C: 건물+펫 합(%)</label><input type="number" id="c_val" placeholder="85" oninput="calc()"></div>
        </div>
        <div class="row-3">
            <div><label>코스튬/도감(%)</label><input type="number" id="d_dogam" placeholder="0" oninput="calc()"></div>
            <div><label>인장/탈것(%)</label><input type="number" id="d_ride" placeholder="0" oninput="calc()"></div>
            <div><label>E: 요정(%)</label><input type="number" id="e_fairy" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">치명타 피해량 (기본 175)</div>
    <div class="card">
        <div class="row">
            <div><label>C: 건물+펫(기본81)</label><input type="number" id="cp_base" placeholder="81" oninput="calc()"></div>
            <div><label>기타 도감/탈것(곱%)</label><input type="number" id="cp_mult" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">종족 피해량 (기본 100)</div>
    <div class="card">
        <div class="row">
            <div><label>A: 승전 버프(%)</label><input type="number" id="sp_win" placeholder="0" oninput="calc()"></div>
            <div><label>D: 도감/탈것(곱%)</label><input type="number" id="sp_mult" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div class="section-title">📦 현재 장비 + 룬 상세</div>
    <div class="card">
        <div class="row">
            <div><label>전공 장비/룬(%)</label><input type="number" id="cur_atk_eq" placeholder="24" oninput="calc()"></div>
            <div><label>치피 장비/룬(%)</label><input type="number" id="cur_cp_eq" placeholder="28" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>종족 장비/룬(%)</label><input type="number" id="cur_sp_eq" placeholder="28" oninput="calc()"></div>
            <div><label>증폭(%)</label><input type="number" id="cur_amp" placeholder="0" oninput="calc()"></div>
        </div>
        <div id="u-info-display" style="font-size:0.7rem; color:var(--unique); text-align:right;">유니크 미적용 상태</div>
    </div>

    <div class="section-title">✨ 시뮬레이션</div>
    <div class="card" style="border: 1px solid var(--accent);">
        <div class="row">
            <div><label>추가 전공</label><input type="number" id="n_atk" placeholder="0" oninput="calc()"></div>
            <div><label>추가 치피</label><input type="number" id="n_cp" placeholder="0" oninput="calc()"></div>
        </div>
        <div class="row">
            <div><label>추가 증폭</label><input type="number" id="n_amp" placeholder="0" oninput="calc()"></div>
            <div><label>추가 종족</label><input type="number" id="n_sp" placeholder="0" oninput="calc()"></div>
        </div>
        <button class="btn" style="background:#2c3e50; border:1px solid var(--unique); color:var(--unique);" onclick="autoSwapSim()">🔄 유니크 스왑 시뮬레이션 버튼</button>
    </div>

    <button class="btn" onclick="toggleElement('log-box')">📊 상세 계산 로그 보기</button>
    <div id="log-box" class="log-container"></div>
</div>

<script>
    function toggleElement(id) {
        const box = document.getElementById(id);
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    // 유니크 버튼 토글
    function toggleUnique(btn) {
        const type = btn.getAttribute('data-type');
        const isAlreadyActive = btn.classList.contains('active');
        const activeBtns = document.querySelectorAll('.u-btn.active');

        if (isAlreadyActive) {
            btn.classList.remove('active');
        } else {
            // 동일 타입 중복 방지 (블피/진블피 등)
            document.querySelectorAll(`.u-btn[data-type="${type}"]`).forEach(b => b.classList.remove('active'));
            // 최대 2개 체크
            if (document.querySelectorAll('.u-btn.active').length >= 2) {
                alert("유니크 장비는 최대 2개까지만 선택 가능합니다.");
                return;
            }
            btn.classList.add('active');
        }
        
        // 질풍신 입력창 제어
        const hasWind = Array.from(document.querySelectorAll('.u-btn.active')).some(b => b.innerText.includes("질풍신"));
        document.getElementById('wind-input-area').style.display = hasWind ? 'block' : 'none';
        
        calc();
    }

    function calc() {
        const g = (id) => {
            const el = document.getElementById(id);
            if(!el) return 0;
            return el.value === "" ? (el.placeholder === "" ? 0 : parseFloat(el.placeholder)) : parseFloat(el.value);
        };
        const mode = document.getElementById('calc_mode').value;
        const carve = document.getElementById('a_carve').checked ? 107 : 100;

        // 1. 유니크 스탯 선계산
        let u_cp = 0;
        let u_amp = 0;
        let ms_total = 0;
        const activeUnique = document.querySelectorAll('.u-btn.active');
        
        activeUnique.forEach(btn => {
            const type = btn.getAttribute('data-type');
            const val = parseFloat(btn.getAttribute('data-val'));
            if(type === 'blood') u_cp = val;
            if(type === 'neck') u_amp += 20;
            if(type === 'wind') {
                ms_total = g('ms_hunter') + g('ms_build') + g('ms_per') + g('ms_shoe') + g('ms_cos') + 
                           g('ms_wing') + g('ms_seal') + g('ms_ride') + g('ms_bow') + g('ms_devil') + 
                           g('ms_etc_sum') + 15;
                let wind_amp = ms_total * (g('ms_wind_rate') / 100);
                u_amp += Math.min(wind_amp, val);
            }
        });

        // 현재 장비 칸 자동 기입 (유니크 기능 사용 시)
        if(activeUnique.length > 0) {
            document.getElementById('cur_amp').value = u_amp;
            document.getElementById('u-info-display').innerText = `유니크 적용: 치피+${u_cp}%, 증폭+${u_amp.toFixed(1)}% (이속:${ms_total}%)`;
        } else {
            document.getElementById('u-info-display').innerText = `유니크 미적용 상태`;
        }

        const getResult = (addAtk, addCp, addAmp, addSp, isCurrent) => {
            // 공격력 계산
            const multA = (100 + g('a_win') + g('a_dungeon')) / 100;
            const multBC = (100 + g('b_etc') + g('c_val') + g('cur_atk_eq') + addAtk) / 100;
            const multD = (100 + g('d_dogam') + g('d_ride')) / 100;
            const multE = (100 + g('e_fairy')) / 100;
            const totalAtk = (mode === 'village') ? carve * multA * multBC * multD * multE : carve * multBC * multD * multE;

            // 치피 계산 (현재 데이터에는 유니크 u_cp가 이미 포함된 것으로 가정하거나 시뮬에서 처리)
            const baseCp = 175 + g('cp_base') + g('cur_cp_eq') + (isCurrent ? u_cp : 0) + addCp;
            const totalCp = (baseCp * (100 + g('cp_mult')) / 100) / 100;

            // 종족 계산 (100 * 1.n * 1.n 구조)
            const spBase = (100 + g('cur_sp_eq') + addSp) / 100;
            const spMult = (100 + g('sp_mult')) / 100;
            const totalSp = (100 * spBase * spMult * (100 + g('sp_win')) / 100) / 100;

            // 증폭 계산
            const totalAmp = (100 + g('cur_amp') + addAmp) / 100;

            return { final: totalAtk * totalCp * totalSp * totalAmp, totalAtk, totalCp, totalSp, totalAmp };
        };

        const cur = getResult(0, 0, 0, 0, true);
        const next = getResult(g('n_atk'), g('n_cp'), g('n_amp'), g('n_sp'), false);

        document.getElementById('cur_d').innerText = Math.floor(cur.final).toLocaleString();
        document.getElementById('next_d').innerText = Math.floor(next.final).toLocaleString();
        const diff = ((next.final / cur.final) - 1) * 100;
        const out = document.getElementById('eff_out');
        out.innerText = `효율: ${diff >= 0 ? '+' : ''}${diff.toFixed(2)}%`;
        out.style.color = diff >= 0 ? '#00e676' : '#ff5252';

        document.getElementById('log-box').innerHTML = 
            `<b>[현재]</b> 공:${cur.totalAtk.toFixed(1)} * 치:${cur.totalCp.toFixed(2)}배 * 종:${cur.totalSp.toFixed(2)}배 * 증:${cur.totalAmp.toFixed(2)}배<br>` +
            `<b>[비교]</b> 공:${next.totalAtk.toFixed(1)} * 치:${next.totalCp.toFixed(2)}배 * 종:${next.totalSp.toFixed(2)}배 * 증:${next.totalAmp.toFixed(2)}배`;
    }

    // 시뮬레이션 자동 완성
    function autoSwapSim() {
        const activeBtns = Array.from(document.querySelectorAll('.u-btn.active')).map(b => b.innerText);
        if(activeBtns.length === 0) { alert("상단 유니크 장비를 먼저 선택해주세요!"); return; }

        let n_cp = 0; let n_amp = 0;
        
        if(activeBtns.some(t => t.includes("블피"))) {
            const isJin = activeBtns.some(t => t.includes("진 블피"));
            n_cp = isJin ? -300 : -250;
            n_amp = 30; // 질풍신 스왑 가정 시 30% 증가로 세팅
            alert("시뮬레이션: 현재 블피 제거(치피 " + n_cp + ") 및 질풍신 장착(증폭 +30) 가정");
        } else if(activeBtns.some(t => t.includes("질풍신"))) {
            n_cp = 300; // 진블피 장착 가정
            n_amp = -(parseFloat(document.getElementById('cur_amp').value)); // 현재 질풍 증폭 제거
            alert("시뮬레이션: 현재 질풍신 제거(증폭 " + n_amp + ") 및 진블피 장착(치피 +300) 가정");
        }
        
        document.getElementById('n_cp').value = n_cp;
        document.getElementById('n_amp').value = n_amp;
        calc();
    }

    window.onload = calc;
</script>
</body>
</html>
